name: First Interaction

on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greet:
    name: Welcome First-Time Contributors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            Thanks for opening your first issue here. A maintainer will
            take a look soon. In the meantime, please make sure you've
            included enough detail to reproduce or evaluate the report.
          pr-message: >
            Thanks for your first pull request. Please make sure the
            checklist in the pull request template is complete, and a
            maintainer will review it shortly.
