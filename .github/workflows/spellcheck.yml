name: Spell Check

on:
  pull_request:
    paths:
      - "**/*.md"

permissions:
  contents: read

jobs:
  spellcheck:
    name: Check Spelling
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: cspell
        uses: streetsidesoftware/cspell-action@v8
        with:
          config: ".cspell.json"
          files: "**/*.md"
