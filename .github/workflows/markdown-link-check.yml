name: Markdown Link Check

on:
  pull_request:
    paths:
      - "**/*.md"
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  link-check:
    name: Check Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Link Checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --exclude-file .lycheeignore
            --no-progress
            "**/*.md"
          fail: true
