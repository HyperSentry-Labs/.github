name: Bug Report
description: Report a reproducible problem in a HyperSentry Labs project.
title: "[Bug]: "
labels:
  - bug
  - triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please search
        existing issues before opening a new one to avoid duplicates.

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version, tag, or commit are you running?
      placeholder: v1.4.2
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where does this occur?
      options:
        - Linux
        - macOS
        - Windows
        - Docker
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: Tell us what you expected to happen and what actually happened.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the minimal steps required to reproduce the issue.
      placeholder: |
        1. Run `...`
        2. Configure `...`
        3. Observe `...`
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Paste any relevant log output. This will be rendered as a code block automatically.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have provided enough information to reproduce the issue.
          required: true
