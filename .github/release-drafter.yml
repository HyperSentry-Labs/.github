name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Breaking Changes"
    labels:
      - "breaking-change"
  - title: "Features"
    labels:
      - "enhancement"
  - title: "Bug Fixes"
    labels:
      - "bug"
  - title: "Documentation"
    labels:
      - "documentation"
  - title: "Dependencies"
    labels:
      - "dependencies"

change-template: "- $TITLE (#$NUMBER)"
exclude-labels:
  - "skip-changelog"

version-resolver:
  major:
    labels:
      - "breaking-change"
  minor:
    labels:
      - "enhancement"
  patch:
    labels:
      - "bug"
      - "documentation"
      - "dependencies"
  default: patch

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/hypersentry-labs/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
